version: '3.9'
services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: skeleton
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg-data:/var/lib/postgresql/data

  server:
    image: ${SERVER_IMAGE:-skeleton-server}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/skeleton
      WEB_URL: http://web
    ports:
      - '4000:4000'

  web:
    image: ${WEB_IMAGE:-skeleton-web}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - server
    ports:
      - '4173:80'

volumes:
  pg-data:
